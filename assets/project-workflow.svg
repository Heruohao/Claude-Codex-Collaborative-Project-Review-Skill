<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">项目审建一体化流程图</title>
  <desc id="desc">从项目主题到调研、方案、评审、对标、实施、验收的八步流程</desc>
  <defs>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#c05621"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="#f8fafc"/>
  <text x="640" y="72" text-anchor="middle" fill="#102033" font-size="42" font-weight="800" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif">项目审建一体化八步闭环</text>
  <text x="640" y="116" text-anchor="middle" fill="#475569" font-size="22" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif">先论证，再评审；先批准，再实施；先验收，再关闭</text>
  <path d="M168 230 H1112" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <path d="M1112 230 C1190 230 1190 530 1112 530 H168" stroke="url(#line)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <g font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif">
    <g transform="translate(84 168)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#0f766e"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">1</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">提出主题</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">目标、用户、约束</text>
    </g>
    <g transform="translate(316 168)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#0f766e"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">2</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">调研论证</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">事实、风险、可行性</text>
    </g>
    <g transform="translate(548 168)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#1e3a5f"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">3</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">沟通讨论</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">确认方向和假设</text>
    </g>
    <g transform="translate(780 168)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#1e3a5f"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">4</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">方案一版</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">范围、路径、验收</text>
    </g>
    <g transform="translate(1012 168)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#c05621"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">5</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">方案评审</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">Claude 联合评审</text>
    </g>
    <g transform="translate(780 468)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#c05621"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">6</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">对标决策</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">优劣、取舍、去留</text>
    </g>
    <g transform="translate(548 468)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#c05621"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">7</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">批准实施</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">按方案执行</text>
    </g>
    <g transform="translate(316 468)" filter="url(#soft)">
      <rect width="168" height="124" rx="18" fill="#ffffff"/>
      <circle cx="84" cy="0" r="28" fill="#0f766e"/>
      <text x="84" y="9" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="800">8</text>
      <text x="84" y="58" text-anchor="middle" fill="#102033" font-size="22" font-weight="800">项目验收</text>
      <text x="84" y="92" text-anchor="middle" fill="#64748b" font-size="16">Claude 联合验收</text>
    </g>
  </g>
  <text x="640" y="690" text-anchor="middle" fill="#64748b" font-size="20" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif">Review approves the plan. Acceptance verifies the delivered result.</text>
</svg>
