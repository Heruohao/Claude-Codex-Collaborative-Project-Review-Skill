<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">项目审建一体化</title>
  <desc id="desc">项目立项、论证、实施、验收的闭环流程封面图</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#102033"/>
      <stop offset="55%" stop-color="#1f3d4d"/>
      <stop offset="100%" stop-color="#7a4b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#f6ad55"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07111f" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M0 470 C170 400 270 550 430 478 C600 402 700 340 910 390 C1065 428 1150 390 1280 330 L1280 640 L0 640 Z" fill="#0f172a" opacity="0.32"/>
  <g transform="translate(118 110)">
    <text x="0" y="0" fill="#f8fafc" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="72" font-weight="800">项目审建一体化</text>
    <text x="2" y="72" fill="#d9e8ee" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="30">立项 · 论证 · 评审 · 决策 · 实施 · 验收</text>
    <rect x="0" y="112" width="510" height="8" rx="4" fill="url(#accent)"/>
    <text x="2" y="178" fill="#f8fafc" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="24">A Codex skill for approval-based project delivery</text>
  </g>
  <g transform="translate(762 112)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="360" rx="28" fill="#f8fafc" opacity="0.96"/>
    <circle cx="180" cy="180" r="118" fill="none" stroke="#0f766e" stroke-width="18" stroke-linecap="round" stroke-dasharray="520 220"/>
    <circle cx="180" cy="180" r="82" fill="none" stroke="#c05621" stroke-width="14" stroke-linecap="round" stroke-dasharray="300 215"/>
    <g font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="58" font-weight="800" text-anchor="middle">
      <text x="180" y="94" fill="#0f766e">审</text>
      <text x="268" y="198" fill="#1e3a5f">论</text>
      <text x="180" y="292" fill="#c05621">建</text>
      <text x="92" y="198" fill="#334155">验</text>
    </g>
    <circle cx="180" cy="180" r="24" fill="url(#accent)"/>
  </g>
  <g transform="translate(118 500)" fill="#e2e8f0" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="24">
    <text x="0" y="0">Plan first. Review jointly. Execute with approval. Accept with evidence.</text>
  </g>
</svg>
